name: Deploy PHP Project to InfinityFree

# Trigger deployment on push to main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Deploy to InfinityFree via FTP
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: ${{ secrets.FTP_PORT }}           # optional, defaults to 21
          local-dir: ./               # deploy contents of project folder
          server-dir: /htdocs/

          #server-dir: ${{ secrets.FTP_DIR }}      #should be /htdocs/ and must end with /
