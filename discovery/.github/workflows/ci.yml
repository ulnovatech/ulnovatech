name: CI



on:

  push:

    branches: [main]

  pull_request:

    branches: [main]



jobs:

  build:

    runs-on: ubuntu-latest



    services:

      postgres:

        image: postgres:16

        env:

          POSTGRES_USER: ci

          POSTGRES_PASSWORD: ci

          POSTGRES_DB: agency_platform

        ports:

          - 5432:5432

        options: >-

          --health-cmd pg_isready

          --health-interval 10s

          --health-timeout 5s

          --health-retries 5



    env:

      DATABASE_URL: postgresql://ci:ci@localhost:5432/agency_platform

      ALLOW_DEV_AUTH: 'true'



    steps:

      - uses: actions/checkout@v4



      - uses: pnpm/action-setup@v4

        with:

          version: 9



      - uses: actions/setup-node@v4

        with:

          node-version: 22

          cache: pnpm



      - run: pnpm install



      - run: pnpm db:migrate



      - run: pnpm typecheck

      - run: pnpm discovery:acceptance

      - run: pnpm test

      - run: pnpm build

