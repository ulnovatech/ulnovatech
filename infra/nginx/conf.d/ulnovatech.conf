# UlnoVaTech main site — ports rules from repo root .htaccess and sub-app htaccess files.
# document_root: /var/www/public_html (mounted from build output)

server {
    listen 80;
    server_name ulnovatech.store www.ulnovatech.store localhost;

    root /var/www/public_html;
    index index.html;

    # Plain health check for load balancers / smoke tests
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Legacy HTML → React routes (.htaccess L3-L5)
    location = /about.html {
        return 301 /about;
    }
    location = /prices.html {
        return 301 /prices;
    }

    # CRM API → ulndash/backend/api.php (.htaccess L12-L13 + backend/.htaccess)
    location /api/ {
        include /etc/nginx/snippets/fastcgi-php.conf;
        fastcgi_pass php-fpm:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/ulndash/backend/api.php;
        fastcgi_param DOCUMENT_ROOT $document_root;
    }

    # Public PHP form handlers (/php/*.php)
    location ^~ /php/ {
        try_files $uri =404;
        location ~ \.php$ {
            include /etc/nginx/snippets/fastcgi-php.conf;
            fastcgi_pass php-fpm:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $document_root;
        }
    }

    # Legacy forms/*.php (optional path)
    location ^~ /forms/ {
        try_files $uri =404;
        location ~ \.php$ {
            include /etc/nginx/snippets/fastcgi-php.conf;
            fastcgi_pass php-fpm:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $document_root;
        }
    }

    # Portfolio JSON API (/portfolio/api/*.php)
    location ^~ /portfolio/api/ {
        try_files $uri =404;
        location ~ \.php$ {
            include /etc/nginx/snippets/fastcgi-php.conf;
            fastcgi_pass php-fpm:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $document_root;
        }
    }

    # Static asset trees (explicit — skip SPA fallback)
    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
    }

    # Portfolio template static files
    location ^~ /portfolio/portfolio/ {
        try_files $uri $uri/ =404;
    }

    # Blog SPA — scripts/htaccess/blog.htaccess
    location ^~ /blog/ {
        try_files $uri $uri/ /blog/index.html;
    }

    # CRM dashboard SPA — scripts/htaccess/dash.htaccess
    location ^~ /dash/ {
        try_files $uri $uri/ /dash/index.html;
    }

    # Portfolio picker SPA — scripts/htaccess/portfolio-app.htaccess
    location ^~ /portfolio-app/ {
        try_files $uri $uri/ /portfolio-app/index.html;
    }

    # Block direct access to backend source outside /api
    location ^~ /ulndash/backend/ {
        deny all;
        return 404;
    }

    # Marketing SPA fallback (.htaccess L15-L25)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
