# Discovery Intelligence — Postgres + Next.js + job worker
# Use with ulnovatech core:
#   docker compose -f infra/docker-compose.yml -f infra/docker-compose.discovery.yml up -d --build
# Or: npm run docker:discovery

name: ulnovatech

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ${DISCOVERY_ENV_FILE:-./env/docker.discovery.env.example}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks:
      - ulnovatech

  discovery-migrate:
    build:
      context: ../discovery
      dockerfile: Dockerfile
      target: worker
    env_file:
      - ${DISCOVERY_ENV_FILE:-./env/docker.discovery.env.example}
    command: ['pnpm', 'db:migrate']
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'
    networks:
      - ulnovatech

  discovery-web:
    build:
      context: ../discovery
      dockerfile: Dockerfile
      target: web
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    env_file:
      - ${DISCOVERY_ENV_FILE:-./env/docker.discovery.env.example}
    volumes:
      - discovery_storage:/app/storage/uploads
    ports:
      - '${DISCOVERY_HTTP_PORT:-3000}:3000'
    depends_on:
      discovery-migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/').then((r)=>process.exit(r.ok||r.status<500?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ulnovatech

  discovery-worker:
    build:
      context: ../discovery
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    env_file:
      - ${DISCOVERY_ENV_FILE:-./env/docker.discovery.env.example}
    volumes:
      - discovery_storage:/app/storage/uploads
    depends_on:
      discovery-migrate:
        condition: service_completed_successfully
    networks:
      - ulnovatech

  nginx:
    volumes:
      - ./nginx/conf.d/discovery.conf:/etc/nginx/conf.d/discovery.conf:ro
    depends_on:
      discovery-web:
        condition: service_healthy

volumes:
  postgres_data:
  discovery_storage:

networks:
  ulnovatech: {}
